<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal PK — Pengetahuan Kuantitatif Matematika</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #ddd6c8;
    --accent: #c05c1a;
    --accent2: #a04a10;
    --text: #2a2218;
    --text-muted: #8a7a66;
    --correct: #2d8a5e;
    --wrong: #c0392b;
    --blue: #2471a3;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -15%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(192,92,26,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-logo {
    font-family: 'Fraunces', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header-logo span {
    color: var(--text-muted);
    font-weight: 300;
    font-style: italic;
    font-size: 0.95rem;
  }

  .header-progress {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-bar {
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
    position: relative;
    z-index: 1;
  }

  .hero {
    text-align: center;
    margin-bottom: 4rem;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(192,92,26,0.08);
    border: 1px solid rgba(192,92,26,0.22);
    color: var(--accent);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 99px;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 0.75rem;
  }

  .hero h1 em {
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 0.95rem;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.45rem 1rem;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fffdf8;
    font-weight: 600;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .q-card:hover { border-color: rgba(232,201,122,0.3); }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(192,92,26,0.08);
    border: 1px solid rgba(192,92,26,0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }

  .q-type-badge {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }
  .badge-pg   { background: rgba(36,113,163,0.1); color: var(--blue); border: 1px solid rgba(36,113,163,0.25); }
  .badge-bs   { background: rgba(45,138,94,0.1); color: var(--correct); border: 1px solid rgba(45,138,94,0.25); }
  .badge-esai { background: rgba(192,92,26,0.08); color: var(--accent2); border: 1px solid rgba(192,92,26,0.22); }

  .q-topic {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  .q-text {
    font-size: 0.98rem;
    line-height: 1.75;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .q-text .math-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    margin: 0.75rem 0;
    color: var(--accent);
    overflow-x: auto;
    white-space: pre;
  }

  .q-text .info-box {
    background: rgba(36,113,163,0.06);
    border-left: 3px solid var(--blue);
    padding: 0.75rem 1rem;
    border-radius: 0 8px 8px 0;
    margin: 0.75rem 0;
    font-size: 0.88rem;
    color: #1a4e6e;
    line-height: 1.6;
  }

  .svg-figure {
    display: flex;
    justify-content: center;
    margin: 1.2rem 0;
    padding: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }

  .svg-figure svg {
    max-width: 280px;
    width: 100%;
    height: auto;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.8rem 1.1rem;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }

  .option-item:hover {
    border-color: var(--accent);
    background: rgba(192,92,26,0.06);
  }

  .option-item.selected {
    border-color: var(--accent);
    background: rgba(192,92,26,0.09);
  }

  .option-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 1.4rem;
    padding-top: 1px;
  }

  .option-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
  }

  .bs-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .bs-table th {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .bs-table th:not(:first-child) { text-align: center; }

  .bs-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid rgba(46,44,39,0.5);
    vertical-align: middle;
  }

  .bs-table tr:last-child td { border-bottom: none; }
  .bs-table td:not(:first-child) { text-align: center; }

  .bs-toggle {
    display: inline-flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    gap: 0;
  }

  .bs-btn {
    padding: 0.3rem 0.9rem;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .bs-btn:hover { color: var(--text); }
  .bs-btn.active-b { background: rgba(111,207,151,0.2); color: var(--correct); }
  .bs-btn.active-s { background: rgba(235,87,87,0.15); color: var(--wrong); }

  .esai-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.2rem;
    transition: border-color 0.2s;
  }
  .esai-area:focus-within { border-color: var(--accent); }

  .esai-area textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.92rem;
    line-height: 1.65;
    padding: 0.8rem 1rem;
    resize: vertical;
    min-height: 100px;
  }

  .esai-area textarea::placeholder { color: var(--text-muted); }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 3rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.65rem 1.4rem;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-primary {
    background: var(--accent);
    color: #fffdf8;
  }
  .btn-primary:hover { background: var(--accent2); }

  .page-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty p { font-size: 0.9rem; }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin: 2.5rem 0 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-title span { color: var(--accent); }

  .sub-q {
    margin: 0.5rem 0 1rem;
    padding-left: 1rem;
    border-left: 2px solid var(--border);
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media(max-width:600px){
    .container { padding: 2rem 1rem 5rem; }
    .q-card { padding: 1.5rem 1.2rem; }
    header { padding: 0 1rem; }
    .header-progress .progress-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">Latihan<em> PK</em></div>
  <div class="header-progress">
    <span id="prog-text">0 / 0 dijawab</span>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
</header>

<div class="container">

  <div class="hero">
    <div class="hero-badge">📐 UTBK Series</div>
    <h1>Latihan Soal<br><em>Pengetahuan Kuantitatif</em></h1>
    <p>Kerjakan soal-soal di bawah tanpa penilaian otomatis. Gunakan sebagai bahan latihan mandiri.</p>
  </div>

  <div class="filter-row" id="filter-row"></div>
  <div id="questions-container"></div>

</div>

// ===================== STATE =====================
let answers = {};
let activeFilter = 'all';

const TOPICS = ['all', ...new Set(soalData.map(s => s.topic))];

// ===================== RENDER =====================
function renderFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = TOPICS.map(t => `
    <button class="filter-btn ${t === activeFilter ? 'active' : ''}" onclick="setFilter('${t}')">
      ${t === 'all' ? '✦ Semua Topik' : t}
    </button>
  `).join('');
}

function setFilter(topic) {
  activeFilter = topic;
  renderFilters();
  renderQuestions();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  const filtered = activeFilter === 'all' ? soalData : soalData.filter(s => s.topic === activeFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Tidak ada soal untuk topik ini.</p></div>`;
    return;
  }

  const groups = {};
  filtered.forEach(s => {
    if (!groups[s.topic]) groups[s.topic] = [];
    groups[s.topic].push(s);
  });

  let html = '';
  let counter = 1;
  Object.entries(groups).forEach(([topic, soals]) => {
    html += `<div class="section-title"><span>◆</span> ${topic}</div>`;
    soals.forEach(s => {
      html += renderCard(s, counter++);
    });
  });

  container.innerHTML = html;

  // Inject SVG for soal 20
  const svgContainer = document.getElementById('svg-container-20');
  if (svgContainer) {
    const tmpl = document.getElementById('svg-11pk');
    if (tmpl) svgContainer.innerHTML = tmpl.innerHTML;
  }

  // Inject SVG for soal 21
  const svgContainer21 = document.getElementById('svg-container-21');
  if (svgContainer21) {
    const tmpl21 = document.getElementById('svg-18pk');
    if (tmpl21) svgContainer21.innerHTML = tmpl21.innerHTML;
  }

  // Inject SVG for soal 25
  const svgContainer25 = document.getElementById('svg-container-25');
  if (svgContainer25) {
    const tmpl25 = document.getElementById('svg-26pk');
    if (tmpl25) svgContainer25.innerHTML = tmpl25.innerHTML;
  }

  // Inject SVG for soal 26
  const svgContainer26 = document.getElementById('svg-container-26');
  if (svgContainer26) {
    const tmpl26 = document.getElementById('svg-27pk');
    if (tmpl26) svgContainer26.innerHTML = tmpl26.innerHTML;
  }
  // Inject SVG for soal 28
  const svgContainer28 = document.getElementById('svg-container-28');
  if (svgContainer28) {
    const tmpl28 = document.getElementById('svg-29pk');
    if (tmpl28) svgContainer28.innerHTML = tmpl28.innerHTML;
  }
  // Inject SVG for soal 34
  const svgContainer34 = document.getElementById('svg-container-34');
  if (svgContainer34) {
    const tmpl34 = document.getElementById('svg-18pk1');
    if (tmpl34) svgContainer34.innerHTML = tmpl34.innerHTML;
  }
  // Inject SVG for soal 40
  const svgContainer40 = document.getElementById('svg-container-40');
  if (svgContainer40) {
    const tmpl40 = document.getElementById('svg-41pk');
    if (tmpl40) svgContainer40.innerHTML = tmpl40.innerHTML;
  }
  // Inject SVG for soal 50

  if (svgContainer50) {
    const tmpl50 = document.getElementById('svg-51pk');
    if (tmpl50) svgContainer50.innerHTML = tmpl50.innerHTML;
  }

  updateProgress(filtered);
}

function renderCard(s, num) {
  const typeLabel = s.type === 'pg' ? 'Pilihan Ganda' :
                    s.type === 'ds' ? 'Pilihan Ganda' :
                    s.type === 'bs' ? 'Benar / Salah' : 'Esai';
  const badgeClass = s.type === 'esai' ? 'badge-esai' : s.type === 'bs' ? 'badge-bs' : 'badge-pg';

  let body = '';

  if (s.type === 'pg' || s.type === 'ds') {
    let stmts = '';
    if (s.statements) {
      stmts = `<div class="info-box" style="margin-bottom:1rem">` +
        s.statements.map(st => `${st.label} ${st.text}`).join('<br>') +
        `</div>`;
    }

    const keys = ['a','b','c','d','e'];
    const optHtml = s.options.map((opt, i) => `
      <div class="option-item ${(answers[s.id] === i) ? 'selected' : ''}"
           onclick="selectOption(${s.id}, ${i}, this)">
        <span class="option-key">${keys[i] || String.fromCharCode(97+i)}.</span>
        <span class="option-text">${opt.replace(/^\([a-e]\)\s*/,'')}</span>
      </div>
    `).join('');

    body = stmts + `<div class="options-list">${optHtml}</div>`;

  } else if (s.type === 'bs') {
    const rows = s.bsItems.map((item, i) => `
      <tr>
        <td>${item.label}. ${item.text}</td>
        <td>
          <div class="bs-toggle">
            <button class="bs-btn ${answers[s.id]?.[i] === 'B' ? 'active-b' : ''}"
                    onclick="toggleBS(${s.id}, ${i}, 'B', this)">Benar</button>
            <button class="bs-btn ${answers[s.id]?.[i] === 'S' ? 'active-s' : ''}"
                    onclick="toggleBS(${s.id}, ${i}, 'S', this)">Salah</button>
          </div>
        </td>
      </tr>
    `).join('');

    body = `<table class="bs-table">
      <thead><tr><th>Pernyataan</th><th>Jawaban</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  } else {
    body = `<div class="esai-area">
      <textarea placeholder="Tuliskan jawaban dan langkah penyelesaian kamu di sini…"
                oninput="saveEsai(${s.id}, this.value)">${answers[s.id] || ''}</textarea>
    </div>`;
  }

  return `
    <div class="q-card" id="card-${s.id}">
      <div class="q-meta">
        <span class="q-num">Soal ${num}</span>
        <span class="q-type-badge ${badgeClass}">${typeLabel}</span>
        <span class="q-topic">${s.topic}</span>
      </div>
      <div class="q-text">${s.text}</div>
      ${body}
    </div>
  `;
}

// ===================== INTERACTIONS =====================
function selectOption(id, idx, el) {
  answers[id] = idx;
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.option-item').forEach((item, i) => {
    item.classList.toggle('selected', i === idx);
  });
  updateProgressAll();
}

function toggleBS(id, itemIdx, val, btn) {
  if (!answers[id]) answers[id] = {};
  const current = answers[id][itemIdx];
  if (current === val) {
    answers[id][itemIdx] = null;
  } else {
    answers[id][itemIdx] = val;
  }
  const toggle = btn.parentElement;
  const [btnB, btnS] = toggle.querySelectorAll('.bs-btn');
  btnB.className = 'bs-btn' + (answers[id][itemIdx] === 'B' ? ' active-b' : '');
  btnS.className = 'bs-btn' + (answers[id][itemIdx] === 'S' ? ' active-s' : '');
  updateProgressAll();
}

function saveEsai(id, val) {
  answers[id] = val;
  updateProgressAll();
}

function isAnswered(s) {
  if (s.type === 'pg' || s.type === 'ds') return answers[s.id] !== undefined;
  if (s.type === 'bs') {
    if (!answers[s.id]) return false;
    return s.bsItems.some((_, i) => answers[s.id][i]);
  }
  if (s.type === 'esai') return answers[s.id] && answers[s.id].trim().length > 0;
  return false;
}

function updateProgress(filtered) { updateProgressAll(); }
function updateProgressAll() {
  const filtered = activeFilter === 'all' ? soalData : soalData.filter(s => s.topic === activeFilter);
  const done = filtered.filter(isAnswered).length;
  const total = filtered.length;
  document.getElementById('prog-text').textContent = `${done} / ${total} dijawab`;
  document.getElementById('prog-fill').style.width = total ? (done/total*100)+'%' : '0%';
}

// ===================== INIT =====================
renderFilters();
renderQuestions();
</script>
</body>
</html>
