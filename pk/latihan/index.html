<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latihan Soal PK — Penalaran & Matematika</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --surface2: #f0ebe0;
    --border: #ddd6c8;
    --accent: #c05c1a;
    --accent2: #a04a10;
    --text: #2a2218;
    --text-muted: #8a7a66;
    --correct: #2d8a5e;
    --wrong: #c0392b;
    --blue: #2471a3;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -20%;
    right: -15%;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(192,92,26,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .header-logo {
    font-family: 'Fraunces', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .header-logo span {
    color: var(--text-muted);
    font-weight: 300;
    font-style: italic;
    font-size: 0.95rem;
  }

  .header-progress {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-bar {
    width: 120px;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
    position: relative;
    z-index: 1;
  }

  .hero {
    text-align: center;
    margin-bottom: 4rem;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: rgba(192,92,26,0.08);
    border: 1px solid rgba(192,92,26,0.22);
    color: var(--accent);
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.35rem 0.9rem;
    border-radius: 99px;
    margin-bottom: 1.5rem;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1px;
    margin-bottom: 0.75rem;
  }

  .hero h1 em {
    color: var(--accent);
    font-style: italic;
    font-weight: 300;
  }

  .hero p {
    color: var(--text-muted);
    font-size: 0.95rem;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.8rem;
    padding: 0.45rem 1rem;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fffdf8;
    font-weight: 600;
  }

  .q-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
    transition: border-color 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .q-card:hover { border-color: rgba(232,201,122,0.3); }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }

  .q-num {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    background: rgba(192,92,26,0.08);
    border: 1px solid rgba(192,92,26,0.2);
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }

  .q-type-badge {
    font-size: 0.68rem;
    font-family: 'DM Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }
  .badge-pg   { background: rgba(36,113,163,0.1); color: var(--blue); border: 1px solid rgba(36,113,163,0.25); }
  .badge-bs   { background: rgba(45,138,94,0.1); color: var(--correct); border: 1px solid rgba(45,138,94,0.25); }
  .badge-esai { background: rgba(192,92,26,0.08); color: var(--accent2); border: 1px solid rgba(192,92,26,0.22); }

  .q-topic {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }

  .q-text {
    font-size: 0.98rem;
    line-height: 1.75;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .q-text .math-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1.2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    margin: 0.75rem 0;
    color: var(--accent);
    overflow-x: auto;
    white-space: pre;
  }

  .q-text .info-box {
    background: rgba(36,113,163,0.06);
    border-left: 3px solid var(--blue);
    padding: 0.75rem 1rem;
    border-radius: 0 8px 8px 0;
    margin: 0.75rem 0;
    font-size: 0.88rem;
    color: #1a4e6e;
    line-height: 1.6;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .option-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.8rem 1.1rem;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
  }

  .option-item:hover {
    border-color: var(--accent);
    background: rgba(192,92,26,0.06);
  }

  .option-item.selected {
    border-color: var(--accent);
    background: rgba(192,92,26,0.09);
  }

  .option-key {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--accent);
    min-width: 1.4rem;
    padding-top: 1px;
  }

  .option-text {
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
  }

  .bs-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.5rem;
    font-size: 0.9rem;
  }

  .bs-table th {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    color: var(--text-muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .bs-table th:not(:first-child) { text-align: center; }

  .bs-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid rgba(46,44,39,0.5);
    vertical-align: middle;
  }

  .bs-table tr:last-child td { border-bottom: none; }
  .bs-table td:not(:first-child) { text-align: center; }

  .bs-toggle {
    display: inline-flex;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    gap: 0;
  }

  .bs-btn {
    padding: 0.3rem 0.9rem;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.15s;
  }

  .bs-btn:hover { color: var(--text); }
  .bs-btn.active-b { background: rgba(111,207,151,0.2); color: var(--correct); }
  .bs-btn.active-s { background: rgba(235,87,87,0.15); color: var(--wrong); }

  .esai-area {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 0.2rem;
    transition: border-color 0.2s;
  }
  .esai-area:focus-within { border-color: var(--accent); }

  .esai-area textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.92rem;
    line-height: 1.65;
    padding: 0.8rem 1rem;
    resize: vertical;
    min-height: 100px;
  }

  .esai-area textarea::placeholder { color: var(--text-muted); }

  .nav-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 3rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 0.65rem 1.4rem;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--text-muted); color: var(--text); }

  .btn-primary {
    background: var(--accent);
    color: #fffdf8;
  }
  .btn-primary:hover { background: var(--accent2); }

  .page-indicator {
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty p { font-size: 0.9rem; }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin: 2.5rem 0 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .section-title span { color: var(--accent); }

  .sub-q {
    margin: 0.5rem 0 1rem;
    padding-left: 1rem;
    border-left: 2px solid var(--border);
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  @media(max-width:600px){
    .container { padding: 2rem 1rem 5rem; }
    .q-card { padding: 1.5rem 1.2rem; }
    header { padding: 0 1rem; }
    .header-progress .progress-bar { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">PK<em> Latihan</em></div>
  <div class="header-progress">
    <span id="prog-text">0 / 0 dijawab</span>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
  </div>
</header>

<div class="container">

  <div class="hero">
    <div class="hero-badge">📐 Penalaran &amp; Matematika</div>
    <h1>Latihan Soal<br><em>Pemahaman &amp; Kuantitatif</em></h1>
    <p>Kerjakan soal-soal di bawah tanpa penilaian otomatis. Gunakan sebagai bahan latihan mandiri.</p>
  </div>

  <div class="filter-row" id="filter-row"></div>
  <div id="questions-container"></div>

</div>

<script>
const soalData = [
  // ---- SOAL 1: Barisan Bilangan Real ----
  {
    id: 1,
    type: 'pg',
    topic: 'Barisan & Deret',
    text: `Barisan bilangan real x₁, x₂, x₃, … memenuhi:

<div class="math-block">(xₙ − xₙ₋₂)/2 = (n mod 2) + ((n+1) mod 2)/2,    n > 2</div>

Diketahui rata-rata nilai suku pertama dan kedua adalah 2, dengan perbandingan nilai masing-masing suku secara berturut-turut adalah 3 : 1.

Berapakah banyaknya dari empat pernyataan berikut yang bernilai benar berdasarkan informasi di atas?
<div class="info-box">
(1) x₃ + x₄ ≥ x₅<br>
(2) x₂₀₂₄ − x₂₀₂₂ = 1<br>
(3) x₂₀₂₅ + x₂₀₂₃ ≤ x₃₂₀₀ + x₃₄₀₀<br>
(4) Hasil penjumlahan xₙ untuk setiap n genap mulai dari x₂ + ⋯ + x₂₀₀ ≥ 5000
</div>`,
    options: ['(a) 0', '(b) 1', '(c) 2', '(d) 3', '(e) 4']
  },

  // ---- SOAL 2: FPB x,y ----
  {
    id: 2,
    type: 'ds',
    topic: 'Teori Bilangan',
    text: `Diberikan suatu FPB(x, y) = p dengan nilai x > y dan x, y ∈ ℕ, serta diberikan juga suatu FPB(x − y, x + y) = q.

Apakah perkalian x dan y menghasilkan bilangan bulat positif yang genap?

Putuskan apakah pernyataan (1) dan (2) berikut cukup untuk menjawab pertanyaan tersebut.`,
    statements: [
      { label: '(1)', text: 'q merupakan bilangan genap' },
      { label: '(2)', text: 'p merupakan bilangan ganjil' },
    ],
    options: [
      'Pernyataan (1) SAJA cukup untuk menjawab pertanyaan, tetapi pernyataan (2) SAJA tidak cukup',
      'Pernyataan (2) SAJA cukup untuk menjawab pertanyaan, tetapi pernyataan (1) SAJA tidak cukup',
      'DUA pernyataan BERSAMA-SAMA cukup untuk menjawab pertanyaan, tetapi SATU pernyataan SAJA tidak cukup',
      'Pernyataan (1) SAJA cukup untuk menjawab pertanyaan dan pernyataan (2) SAJA cukup',
      'Pernyataan (1) dan pernyataan (2) tidak cukup untuk menjawab pertanyaan'
    ]
  },

  // ---- SOAL 3: Barisan Aritmatika x,y,z ----
  {
    id: 3,
    type: 'bs',
    topic: 'Barisan & Deret',
    text: `Terdapat suatu barisan aritmatika dengan 3 suku pertamanya adalah x, y, z. Jika FPB dari setiap 2 bilangan asli x, y, dan z adalah 2, maka didefinisikan x(y−5)/2 = 9 dan z − x = 4 dengan 7 < y < 11.

Berdasarkan informasi berikut, manakah pernyataan di bawah ini yang bernilai benar?`,
    bsItems: [
      { label: '1', text: 'Beda dari setiap suku ke-n adalah 3.' },
      { label: '2', text: 'Jika u₁ + u₂ + u₃ + ⋯ + u₅₀₄ = 63.750, maka n = 250.' },
      { label: '3', text: 'Nilai dari U₅₀₅₀ − U₄₉₉₉ menghasilkan bilangan genap.' },
    ]
  },

  // ---- SOAL 4: PIN ATM ----
  {
    id: 4,
    type: 'esai',
    topic: 'Kombinatorika',
    text: `Diketahui PIN ATM terdiri dari 6 digit bilangan. Banyaknya PIN berbeda yang dapat disusun dari angka 1, 2, 3, 4, 5, 6 dengan syarat PIN yang tersusun harus habis dibagi 2 adalah …`
  },

  // ---- SOAL 5: Prima m dan n ----
  {
    id: 5,
    type: 'ds',
    topic: 'Teori Bilangan',
    text: `Diberikan dua buah bilangan m dan n adalah bilangan prima. Apakah (7 − m) · (6 − n) adalah bilangan genap?

Putuskan apakah pernyataan (1) dan (2) berikut cukup untuk menjawab pernyataan berikut.`,
    statements: [
      { label: 'i.', text: 'm < 4' },
      { label: 'ii.', text: 'n > 20' },
    ],
    options: [
      'Pernyataan (1) SAJA cukup untuk menjawab pertanyaan, tetapi pernyataan (2) SAJA tidak cukup',
      'Pernyataan (2) SAJA cukup untuk menjawab pertanyaan, tetapi pernyataan (1) SAJA tidak cukup',
      'DUA pernyataan BERSAMA-SAMA cukup untuk menjawab pertanyaan, tetapi SATU pernyataan SAJA tidak cukup',
      'Pernyataan (1) SAJA cukup untuk menjawab pertanyaan dan pernyataan (2) SAJA cukup',
      'Pernyataan (1) dan pernyataan (2) tidak cukup untuk menjawab pertanyaan'
    ]
  },

  // ---- SOAL 6: Triple (a,b,c) ----
  {
    id: 6,
    type: 'esai',
    topic: 'Kombinatorika',
    text: `Diberikan tiga buah bilangan a, b, c yang boleh sama antar satu sama lain. Bilangan a, b, c haruslah anggota dari himpunan {1, 2, 3, 4, 5}. Selain itu, jumlah dari bilangan tersebut haruslah 9.

Maka, banyaknya kemungkinan pasangan (a, b, c) yang dapat dipilih adalah …`
  },

  // ---- SOAL 7: Barisan Geometri ----
  {
    id: 7,
    type: 'pg',
    topic: 'Barisan & Deret',
    text: `Diberikan barisan bilangan 2, 4a, 32, −128, … merupakan barisan geometri. Kemudian, diberikan beberapa pernyataan sebagai berikut.
<div class="info-box">
1. Nilai a habis dibagi 4<br>
2. Selisih antara suku-suku ganjilnya selalu genap<br>
3. Jumlahan dari 10 suku pertamanya habis dibagi 2<br>
4. Suku ke-2024 habis dibagi 4
</div>
Berapa banyaknya dari empat pernyataan berikut yang bernilai benar berdasarkan informasi di atas?`,
    options: ['(a) 0', '(b) 1', '(c) 2', '(d) 3', '(e) 4']
  },

  // ---- SOAL 8: Fungsi f(x) dan g(c) ----
  {
    id: 8,
    type: 'pg',
    topic: 'Fungsi',
    text: `Diketahui fungsi f(x) = x² − 5x + 6 dan g(c) = √c + 2.

<div style="margin:1rem 0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
<table style="width:100%;border-collapse:collapse;font-size:0.88rem;">
<tr>
<th style="padding:0.6rem 1rem;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;color:var(--text-muted)">A</th>
<th style="padding:0.6rem 1rem;text-align:center;border-bottom:1px solid var(--border);font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;color:var(--text-muted)">B</th>
</tr>
<tr>
<td style="padding:0.7rem 1rem;text-align:center">f(g(c)) untuk c = 4 atau 16</td>
<td style="padding:0.7rem 1rem;text-align:center">5</td>
</tr>
</table>
</div>

Kesimpulan yang tepat dari soal tersebut adalah …`,
    options: ['(a) A > B', '(b) B > A', '(c) A = B', '(d) Tidak dapat ditarik kesimpulan', '(e) Informasi tidak cukup untuk menjawab pertanyaan di atas']
  },

  // ---- SOAL 9: V = 21² × n ----
  {
    id: 9,
    type: 'esai',
    topic: 'Aljabar',
    text: `Diketahui V = 21² + 21² + ⋯ + 21² (hasil penjumlahan bilangan 21² sebanyak n). Jika:
<div class="math-block">√V = 21²</div>
Maka nilai n adalah …`
  },

  // ---- SOAL 10: Tabel fungsi ----
  {
    id: 10,
    type: 'pg',
    topic: 'Fungsi',
    text: `Diberikan tabel nilai fungsi sebagai berikut:

<div style="margin:1rem 0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
<table style="width:auto;border-collapse:collapse;font-size:0.9rem;margin:0 auto;">
<tr>
<td style="padding:0.5rem 1.2rem;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--text-muted);border-right:1px solid var(--border);border-bottom:1px solid var(--border)">x</td>
<td style="padding:0.5rem 1.2rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">0</td>
<td style="padding:0.5rem 1.2rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">1</td>
<td style="padding:0.5rem 1.2rem;text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border)">2</td>
<td style="padding:0.5rem 1.2rem;text-align:center;border-bottom:1px solid var(--border)">3</td>
</tr>

// ===================== STATE =====================
let answers = {};
let activeFilter = 'all';

const TOPICS = ['all', ...new Set(soalData.map(s => s.topic))];

// ===================== RENDER =====================
function renderFilters() {
  const row = document.getElementById('filter-row');
  row.innerHTML = TOPICS.map(t => `
    <button class="filter-btn ${t === activeFilter ? 'active' : ''}" onclick="setFilter('${t}')">
      ${t === 'all' ? '✦ Semua Topik' : t}
    </button>
  `).join('');
}

function setFilter(topic) {
  activeFilter = topic;
  renderFilters();
  renderQuestions();
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  const filtered = activeFilter === 'all' ? soalData : soalData.filter(s => s.topic === activeFilter);

  if (!filtered.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>Tidak ada soal untuk topik ini.</p></div>`;
    return;
  }

  const groups = {};
  filtered.forEach(s => {
    if (!groups[s.topic]) groups[s.topic] = [];
    groups[s.topic].push(s);
  });

  let html = '';
  let counter = 1;
  Object.entries(groups).forEach(([topic, soals]) => {
    html += `<div class="section-title"><span>◆</span> ${topic}</div>`;
    soals.forEach(s => {
      html += renderCard(s, counter++);
    });
  });

  container.innerHTML = html;
  updateProgress(filtered);
}

function renderCard(s, num) {
  const typeLabel = s.type === 'pg' ? 'Pilihan Ganda' :
                    s.type === 'ds' ? 'Pilihan Ganda' :
                    s.type === 'bs' ? 'Benar / Salah' : 'Esai';
  const badgeClass = s.type === 'esai' ? 'badge-esai' : s.type === 'bs' ? 'badge-bs' : 'badge-pg';

  let body = '';

  if (s.type === 'pg' || s.type === 'ds') {
    let stmts = '';
    if (s.statements) {
      stmts = `<div class="info-box" style="margin-bottom:1rem">` +
        s.statements.map(st => `${st.label} ${st.text}`).join('<br>') +
        `</div>`;
    }

    const keys = ['a','b','c','d','e'];
    const optHtml = s.options.map((opt, i) => `
      <div class="option-item ${(answers[s.id] === i) ? 'selected' : ''}"
           onclick="selectOption(${s.id}, ${i}, this)">
        <span class="option-key">${keys[i] || String.fromCharCode(97+i)}.</span>
        <span class="option-text">${opt.replace(/^\([a-e]\)\s*/,'')}</span>
      </div>
    `).join('');

    body = stmts + `<div class="options-list">${optHtml}</div>`;

  } else if (s.type === 'bs') {
    const rows = s.bsItems.map((item, i) => `
      <tr>
        <td>${item.label}. ${item.text}</td>
        <td>
          <div class="bs-toggle">
            <button class="bs-btn ${answers[s.id]?.[i] === 'B' ? 'active-b' : ''}"
                    onclick="toggleBS(${s.id}, ${i}, 'B', this)">Benar</button>
            <button class="bs-btn ${answers[s.id]?.[i] === 'S' ? 'active-s' : ''}"
                    onclick="toggleBS(${s.id}, ${i}, 'S', this)">Salah</button>
          </div>
        </td>
      </tr>
    `).join('');

    body = `<table class="bs-table">
      <thead><tr><th>Pernyataan</th><th>Jawaban</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;

  } else {
    body = `<div class="esai-area">
      <textarea placeholder="Tuliskan jawaban dan langkah penyelesaian kamu di sini…"
                oninput="saveEsai(${s.id}, this.value)">${answers[s.id] || ''}</textarea>
    </div>`;
  }

  return `
    <div class="q-card" id="card-${s.id}">
      <div class="q-meta">
        <span class="q-num">Soal ${num}</span>
        <span class="q-type-badge ${badgeClass}">${typeLabel}</span>
        <span class="q-topic">${s.topic}</span>
      </div>
      <div class="q-text">${s.text}</div>
      ${body}
    </div>
  `;
}

// ===================== INTERACTIONS =====================
function selectOption(id, idx, el) {
  answers[id] = idx;
  const card = document.getElementById('card-' + id);
  card.querySelectorAll('.option-item').forEach((item, i) => {
    item.classList.toggle('selected', i === idx);
  });
  updateProgressAll();
}

function toggleBS(id, itemIdx, val, btn) {
  if (!answers[id]) answers[id] = {};
  const current = answers[id][itemIdx];
  if (current === val) {
    answers[id][itemIdx] = null;
  } else {
    answers[id][itemIdx] = val;
  }
  const toggle = btn.parentElement;
  const [btnB, btnS] = toggle.querySelectorAll('.bs-btn');
  btnB.className = 'bs-btn' + (answers[id][itemIdx] === 'B' ? ' active-b' : '');
  btnS.className = 'bs-btn' + (answers[id][itemIdx] === 'S' ? ' active-s' : '');
  updateProgressAll();
}

function saveEsai(id, val) {
  answers[id] = val;
  updateProgressAll();
}

function isAnswered(s) {
  if (s.type === 'pg' || s.type === 'ds') return answers[s.id] !== undefined;
  if (s.type === 'bs') {
    if (!answers[s.id]) return false;
    return s.bsItems.some((_, i) => answers[s.id][i]);
  }
  if (s.type === 'esai') return answers[s.id] && answers[s.id].trim().length > 0;
  return false;
}

function updateProgress(filtered) { updateProgressAll(); }
function updateProgressAll() {
  const filtered = activeFilter === 'all' ? soalData : soalData.filter(s => s.topic === activeFilter);
  const done = filtered.filter(isAnswered).length;
  const total = filtered.length;
  document.getElementById('prog-text').textContent = `${done} / ${total} dijawab`;
  document.getElementById('prog-fill').style.width = total ? (done/total*100)+'%' : '0%';
}

// ===================== INIT =====================
renderFilters();
renderQuestions();
</script>
